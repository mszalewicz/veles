<!doctype html>
<html lang="en">
    <head>
        <script type="module" src="./src/3d.js"></script>
        <script type="module" src="./src/main.js"></script>
        <style>
            :root {
                --h-arrow-from-bottom: 30px;
                --v-arrow-from-left: 30px;
                --edge-gap: 40px;
                --thickness: 4px;
                --head-size: 8px;
                --color: blanchedalmond;
                --canvas-margin: 50px;
            }

            body,
            html {
                margin: 0;
                padding: 0;
                height: 100vh;
                background-color: lightgray;
                overflow: hidden;
                background: linear-gradient(135deg, lightgrey 0%, black 90%);
                background-attachment: fixed;
            }

            #canvas-container {
                position: absolute;
                left: calc(var(--v-arrow-from-left) + var(--thickness) + var(--canvas-margin));
                bottom: calc(var(--h-arrow-from-bottom) + var(--thickness) + var(--canvas-margin));
                right: var(--edge-gap);
                top: var(--edge-gap);
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: sans-serif;
                border-radius: 4px;
            }

            /* --- ARROW STYLING --- */
            .arrow-h,
            .arrow-v {
                position: absolute;
                background-color: var(--color);
                /* This applies the shadow to the line AND the pseudo-element heads */
                filter: var(--arrow-shadow);
            }

            .arrow-h {
                bottom: var(--h-arrow-from-bottom);
                left: var(--edge-gap);
                right: var(--edge-gap);
                height: var(--thickness);
                min-width: calc(var(--head-size) * 4);
            }

            .arrow-v {
                left: var(--v-arrow-from-left);
                top: var(--edge-gap);
                bottom: var(--edge-gap);
                width: var(--thickness);
                min-height: calc(var(--head-size) * 4);
            }

            .arrow-h::before,
            .arrow-h::after,
            .arrow-v::before,
            .arrow-v::after {
                content: "";
                position: absolute;
                width: var(--head-size);
                height: var(--head-size);
                border-top: var(--thickness) solid var(--color);
                border-right: var(--thickness) solid var(--color);
            }

            .arrow-h::before {
                left: 0;
                top: calc(var(--thickness) * -1);
                transform: rotate(-135deg);
            }
            .arrow-h::after {
                right: 0;
                top: calc(var(--thickness) * -1);
                transform: rotate(45deg);
            }

            .arrow-v::before {
                top: 0;
                left: calc(var(--thickness) * -1);
                transform: rotate(-45deg);
            }
            .arrow-v::after {
                bottom: 0;
                left: calc(var(--thickness) * -1);
                transform: rotate(135deg);
            }

            .measure-label {
                position: absolute;
                color: blanchedalmond;
                font-family: monospace;
                font-weight: bold;
                font-size: 30px;
                z-index: 20; /* Higher than canvas-container */
                pointer-events: none;
                backdrop-filter: blur(15px);
                padding: 50px;
                border: 1px solid blanchedalmond;
                border-radius: 15px;
                display: inline-block;
                white-space: nowrap;
            }

            .measure-label-small {
                position: absolute;
                color: blanchedalmond;
                font-family: monospace;
                font-weight: bold;
                font-size: 20px;
                z-index: 20;
                pointer-events: none;
                backdrop-filter: blur(10px);
                padding: 20px;
                border: 1px solid blanchedalmond;
                border-radius: 5px;
                /*background: linear-gradient(to right, #f9f9f9, #f5f5f5);*/
            }

            #label-height {
                top: var(--edge-gap);
                left: calc(
                    var(--v-arrow-from-left) + var(--thickness) + 15px
                );
            }

            #label-width {
                bottom: calc(
                    var(--h-arrow-from-bottom) + var(--thickness) + 15px
                );
                right: var(--edge-gap);
            }

            .center-label {
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 30px;
            }
        </style>
    </head>
    <body>
        <div id="label-height" class="measure-label-small">10</div>
        <div id="label-width" class="measure-label-small">20</div>
        <div id="label-center" class="measure-label center-label">30 x 40</div>

        <div id="canvas-container"></div>

        <div class="arrow-h"></div>
        <div class="arrow-v"></div>
    </body>
</html>
